input {
  udp {
    port => 5514
    codec => plain { charset => "UTF-8" }
    tags => ["kerio_connect", "syslog", "udp"]
  }

  tcp {
    port => 5514
    codec => plain { charset => "UTF-8" }
    tags => ["kerio_connect", "syslog", "tcp"]
  }
}

filter {
  mutate {
    gsub => [
      "message", "^\uFEFF", "",
      "message", "^\s*﻿\s*", "",
      "message", "\r", ""
    ]
  }

  if [message] =~ /^\s*$/ {
    drop { }
  } else {
    mutate {
      copy => { "message" => "[event][original]" }
    }
  }

  #
  # RFC5424 envelope
  #
  grok {
    tag_on_failure => ["_kerio_rfc5424_parse_failure"]
    match => {
      "message" => [
        '^<%{NUMBER:[log][syslog][priority]:int}>%{NUMBER:[log][syslog][version]:int} %{TIMESTAMP_ISO8601:[@metadata][kerio_ts]} %{HOSTNAME:[host][name]} %{DATA:[process][name]} - - - %{GREEDYDATA:[@metadata][kerio_payload]}$'
      ]
    }
  }

  mutate {
    add_field => {
      "[service][name]" => "kerio-connect"
      "[event][provider]" => "kerio-connect"
      "[event][module]" => "kerio_connect"
      "[event][dataset]" => "kerio.connect"
      "[observer][product]" => "Kerio Connect"
      "[observer][type]" => "mail_server"
      "[observer][vendor]" => "GFI"
      "[labels][pipeline]" => "kerio-connect-main"
    }
  }

  date {
    match => ["[@metadata][kerio_ts]", "ISO8601"]
    target => "@timestamp"
  }

  if [process][name] {
    mutate {
      add_field => {
        "[kerio][component]" => "%{[process][name]}"
      }
    }
  }

  if [@metadata][kerio_payload] {
    mutate {
      replace => { "message" => "%{[@metadata][kerio_payload]}" }
    }
  }

  ruby {
    code => '
      ["message", "[@metadata][from_block]", "[email][subject]", "[email][from][name]"].each do |path|
        value = event.get(path)
        next unless value.is_a?(String)

        cleaned = value.sub(/\A[\uFEFF\uFFFD\s]+/, "")
        cleaned = cleaned.gsub(/[\u0000-\u001F\u007F]/, " ")
        cleaned = cleaned.gsub(/\s+/, " ").strip
        event.set(path, cleaned)
      end

      host_name = event.get("[host][name]")
      if host_name.is_a?(Array) && !host_name.empty?
        event.set("[host][name]", host_name.last)
      end
    '
  }

  if [message] =~ /^[,\s]*$/ {
    drop { }
  }

  if [message] =~ /^Attempt to deliver to unknown recipient / {
    grok {
      tag_on_failure => []
      match => {
        "message" => [
          "^Attempt to deliver to unknown recipient <%{EMAILADDRESS:[email][to][address]}>, from <%{EMAILADDRESS:[email][from][address]}>, IP address %{IP:[source][ip]}$"
        ]
      }
    }
  }

  ######################################################################
  # AUDIT
  ######################################################################
  if [process][name] == "audit" or [message] =~ /^[^:]+: User [^ ]+ authenticated\s+from IP address / {
    grok {
      tag_on_failure => ["_kerio_audit_parse_failure"]
      match => {
        "message" => [
          "^%{DATA:[kerio][protocol_raw]}: User %{EMAILADDRESS:[user][email]} authenticated\s+from IP address %{IP:[source][ip]}(?:,)?(?:; %{GREEDYDATA:[user_agent][original]})?$"
        ]
      }
    }

    if [user][email] {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][type]" => "start"
          "[event][action]" => "user_authenticated"
          "[event][outcome]" => "success"
          "[related][ip]" => "%{[source][ip]}"
          "[related][user]" => "%{[user][email]}"
        }
      }

      grok {
        tag_on_failure => []
        match => {
          "[user][email]" => "^(?<[@metadata][user_name_only]>[^@]+)@(?<[@metadata][user_domain_only]>.+)$"
        }
      }

      if [@metadata][user_name_only] {
        mutate {
          add_field => {
            "[user][name]" => "%{[@metadata][user_name_only]}"
            "[user][domain]" => "%{[@metadata][user_domain_only]}"
          }
        }
      }

      if [kerio][protocol_raw] == "IMAP" {
        mutate {
          add_field => {
            "[network][protocol]" => "imap"
            "[kerio][protocol]" => "IMAP"
          }
        }
      } else if [kerio][protocol_raw] == "POP3" {
        mutate {
          add_field => {
            "[network][protocol]" => "pop3"
            "[kerio][protocol]" => "POP3"
          }
        }
      } else if [kerio][protocol_raw] == "SMTP" {
        mutate {
          add_field => {
            "[network][protocol]" => "smtp"
            "[kerio][protocol]" => "SMTP"
          }
        }
      } else if [kerio][protocol_raw] == "HTTP/KOFF" {
        mutate {
          add_field => {
            "[network][protocol]" => "http"
            "[kerio][protocol]" => "HTTP/KOFF"
          }
        }
      } else if [kerio][protocol_raw] == "HTTP/WebMail" {
        mutate {
          add_field => {
            "[network][protocol]" => "http"
            "[kerio][protocol]" => "HTTP/WebMail"
          }
        }
      } else if [kerio][protocol_raw] == "HTTP/WebAdmin" {
        mutate {
          add_field => {
            "[network][protocol]" => "http"
            "[kerio][protocol]" => "HTTP/WebAdmin"
          }
        }
      }

      mutate {
        add_field => {
          "[kerio][log_type]" => "audit"
        }
      }
    }
  }

  ######################################################################
  # SECURITY
  ######################################################################
  else if [process][name] == "security" {
    grok {
      tag_on_failure => []
      match => {
        "message" => [
          "^SMTP Spam attack detected from %{IP:[source][ip]}:%{NUMBER:[source][port]:int}, %{GREEDYDATA:[event][reason]}$"
        ]
      }
    }

    if [source][port] and [event][reason] {
      mutate {
        add_field => {
          "[event][category]" => "threat"
          "[event][type]" => "indicator"
          "[event][action]" => "smtp_spam_attack_detected"
          "[event][outcome]" => "failure"
          "[network][protocol]" => "smtp"
          "[related][ip]" => "%{[source][ip]}"
        }
      }
    }

    if ![event][action] {
      grok {
        tag_on_failure => []
        match => {
          "message" => [
            "^%{DATA:[kerio][protocol_raw]}: User %{EMAILADDRESS:[user][email]} doesn't exist\. Attempt from IP address %{IP:[source][ip]}\.?$"
          ]
        }
      }
    }

    if [user][email] and ![event][action] and [message] =~ /doesn't exist/ {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][type]" => "start"
          "[event][action]" => "login_failed"
          "[event][outcome]" => "failure"
          "[event][reason]" => "user_not_found"
          "[related][ip]" => "%{[source][ip]}"
          "[related][user]" => "%{[user][email]}"
        }
      }
    }

    if ![event][action] {
      grok {
        tag_on_failure => []
        match => {
          "message" => [
            "^Failed %{DATA:[kerio][protocol_raw]} login from %{IP:[source][ip]}, user %{EMAILADDRESS:[user][email]}(?: not found)?\.?$"
          ]
        }
      }
    }

    if [user][email] and ![event][action] and [message] =~ /^Failed / {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][type]" => "start"
          "[event][action]" => "login_failed"
          "[event][outcome]" => "failure"
          "[related][ip]" => "%{[source][ip]}"
          "[related][user]" => "%{[user][email]}"
        }
      }
      if [message] =~ /not found/ {
        mutate { add_field => { "[event][reason]" => "user_not_found" } }
      }
    }

    if ![event][action] {
      grok {
        tag_on_failure => []
        match => {
          "message" => [
            "^Failed %{DATA:[kerio][protocol_raw]} login from %{IP:[source][ip]} with SASL method %{WORD:[kerio][sasl_method]}\.?$"
          ]
        }
      }
    }

    if [kerio][sasl_method] and ![event][action] {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][type]" => "start"
          "[event][action]" => "login_failed"
          "[event][outcome]" => "failure"
          "[related][ip]" => "%{[source][ip]}"
        }
      }
    }

    if ![event][action] {
      grok {
        tag_on_failure => []
        match => {
          "message" => [
            "^%{DATA:[kerio][protocol_raw]}: User %{EMAILADDRESS:[user][email]} - login denied: Access Policy rule '%{DATA:[kerio][access_policy_rule]}' used\. Attempt from IP address %{IP:[source][ip]}\.?$"
          ]
        }
      }
    }

    if [kerio][access_policy_rule] {
      mutate {
        add_field => {
          "[event][category]" => "authentication"
          "[event][type]" => "denied"
          "[event][action]" => "login_denied"
          "[event][outcome]" => "failure"
          "[event][reason]" => "access_policy"
          "[related][ip]" => "%{[source][ip]}"
          "[related][user]" => "%{[user][email]}"
        }
      }
    }

    if [kerio][protocol_raw] == "IMAP" {
      mutate { add_field => { "[network][protocol]" => "imap" } }
    } else if [kerio][protocol_raw] == "POP3" {
      mutate { add_field => { "[network][protocol]" => "pop3" } }
    } else if [kerio][protocol_raw] == "SMTP" {
      mutate { add_field => { "[network][protocol]" => "smtp" } }
    } else if [kerio][protocol_raw] == "HTTP/KOFF" {
      mutate {
        add_field => {
          "[network][protocol]" => "http"
          "[kerio][protocol]" => "HTTP/KOFF"
        }
      }
    }

    if ![event][action] and [message] !~ /^Attempt to deliver to unknown recipient / {
      mutate { add_tag => ["_kerio_security_unparsed"] }
    }
  }

  ######################################################################
  # WARN
  ######################################################################
  else if [process][name] == "warn" {
    grok {
      tag_on_failure => []
      match => {
        "message" => [
          "^No local mailbox %{EMAILADDRESS:[email][to][address]}, expanded from %{EMAILADDRESS:[kerio][expanded_from]}$",
          "^Address <%{EMAILADDRESS:[email][to][address]}> expanded to zero recipients$"
        ]
      }
    }

    if [email][to][address] {
      mutate {
        add_field => {
          "[event][category]" => "email"
          "[event][type]" => "info"
          "[event][action]" => "address_expansion_warning"
          "[event][outcome]" => "failure"
        }
      }
    } else {
      mutate { add_tag => ["_kerio_warn_unparsed"] }
    }
  }

  ######################################################################
  # OPERATIONS
  ######################################################################
  else if [process][name] == "operations" {
    grok {
      tag_on_failure => []
      match => {
        "message" => [
          '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, Destination Folder: %{DATA:[kerio][folder][destination]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Msg-Id: <<%{DATA:[message_id]}>>, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$',
          '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Msg-Id: <<%{DATA:[message_id]}>>, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$',
          '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, Destination Folder: %{DATA:[kerio][folder][destination]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$',
          '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$'
        ]
      }
    }

    if [event][action] {
      mutate {
        lowercase => ["[event][action]"]
        add_field => {
          "[event][category]" => "email"
          "[event][type]" => "change"
          "[related][ip]" => "%{[source][ip]}"
          "[related][user]" => "%{[user][email]}"
        }
      }

      grok {
        tag_on_failure => []
        match => {
          "[@metadata][from_block]" => [
            '^""%{DATA:[email][from][name]}"" <%{EMAILADDRESS:[email][from][address]}>$',
            '^"%{DATA:[email][from][name]}" <%{EMAILADDRESS:[email][from][address]}>$',
            '^<%{EMAILADDRESS:[email][from][address]}>$',
            '^%{DATA:[email][from][name]} <%{EMAILADDRESS:[email][from][address]}>$'
          ]
        }
      }

      if [kerio][protocol_raw] == "IMAP" {
        mutate { add_field => { "[network][protocol]" => "imap" } }
      } else if [kerio][protocol_raw] == "HTTP/KOFF" {
        mutate {
          add_field => {
            "[network][protocol]" => "http"
            "[kerio][protocol]" => "HTTP/KOFF"
          }
        }
      }

      mutate {
        gsub => [
          "[email][subject]", '^""', '"',
          "[email][subject]", '""$', '"'
        ]
      }

      date {
        match => ["[kerio][delivered_raw]", "dd/MMM/yyyy HH:mm:ss"]
        target => "[kerio][delivered_at]"
        locale => "en"
      }
    }

    if ![event][action] {
      mutate { add_tag => ["_kerio_operations_unparsed"] }
    }
  }

  ######################################################################
  # MAIL + AGGREGATE
  ######################################################################
  else if [process][name] == "mail" or ([process][name] == "kerio" and [message] =~ /^(Recv:|Sent:|SMTP Send:)/) {

    grok {
      match => {
        "message" => [
          "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?(?:, SSL: %{WORD:[kerio][ssl]})?, Subject: %{DATA:[email][subject]}, Msg-Id: <%{DATA:[message_id]}>$",
          "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?, SSL: %{WORD:[kerio][ssl]}, Subject: %{GREEDYDATA:[email][subject]}$"
        ]
      }
      tag_on_failure => []
    }

    if ![email][local_id] {
      grok {
        match => {
          "message" => [
            "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?(?:, SSL: %{WORD:[kerio][ssl]})?, Msg-Id: <%{DATA:[message_id]}>, Subject: %{GREEDYDATA:[email][subject]}$",
            "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?, SSL: %{WORD:[kerio][ssl]}, Msg-Id: <%{DATA:[message_id]}>, Subject: %{GREEDYDATA:[email][subject]}$"
          ]
        }
        tag_on_failure => []
      }
    }

    if ![email][local_id] {
      grok {
        match => {
          "message" => [
            "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?, SSL: %{WORD:[kerio][ssl]}, Msg-Id: <%{DATA:[message_id]}>$"
          ]
        }
        tag_on_failure => []
      }
    }

    if ![email][local_id] {
      grok {
        match => {
          "message" => [
            "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Report: %{DATA:[kerio][report]}, Subject: %{GREEDYDATA:[email][subject]}$",
            "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Report: %{DATA:[kerio][report]}, User: %{DATA:[kerio][user_raw]}, Subject: %{GREEDYDATA:[email][subject]}$"
          ]
        }
        tag_on_failure => []
      }
    }

    if ![email][local_id] {
      grok {
        match => {
          "message" => [
            "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}, SSL: %{WORD:[kerio][ssl]}, Subject: %{GREEDYDATA:[email][subject]}$"
          ]
        }
        tag_on_failure => []
      }
    }

    if [message] =~ /^Recv:/ and [email][local_id] {
      mutate {
        add_field => {
          "[kerio][flow_kind]" => "recv"
          "[kerio][log_type]" => "mail_raw"
          "[event][category]" => "email"
          "[event][type]" => "info"
          "[event][action]" => "message_received"
          "[event][outcome]" => "success"
        }
      }
    }

    if ![kerio][flow_kind] {
      grok {
        match => {
          "message" => [
            "^Sent: Queue-ID: %{DATA:[email][local_id]}, Recipient: <%{EMAILADDRESS:[email][to][address]}>, Result: %{DATA:[kerio][result]}, Status: %{DATA:[kerio][status]} ?, Remote-Host: %{IP:[destination][ip]}, Msg-Id: <%{DATA:[message_id]}>$",
            "^Sent: Queue-ID: %{DATA:[email][local_id]}, Recipient: <%{EMAILADDRESS:[email][to][address]}>, Result: %{DATA:[kerio][result]}, Status: %{DATA:[kerio][status]} ?, Remote-Host: %{IP:[destination][ip]}$"
          ]
        }
        tag_on_failure => []
      }
    }

    if [message] =~ /^Sent:/ and [email][local_id] {
      mutate {
        add_field => {
          "[kerio][flow_kind]" => "sent"
          "[kerio][log_type]" => "mail_raw"
          "[event][category]" => "email"
          "[event][type]" => "info"
          "[event][action]" => "message_sent"
        }
      }
    }

    if [kerio][flow_kind] == "sent" {
      if [kerio][result] == "delivered" or [kerio][result] == "relayed" {
        mutate { add_field => { "[event][outcome]" => "success" } }
      } else if [kerio][result] == "delayed" {
        mutate { add_field => { "[event][outcome]" => "unknown" } }
      } else if [kerio][result] {
        mutate { add_field => { "[event][outcome]" => "failure" } }
      }
    }

    if ![email][local_id] {
      grok {
        match => {
          "message" => [
            "^SMTP Send: %{NUMBER:[kerio][smtp_processed_count]:int} outgoing messages? processed in %{WORD:[kerio][smtp_queue]} queue run$",
            "^SMTP Send: %{NUMBER:[kerio][smtp_processed_count]:int} outgoing messages processed in %{NUMBER:[kerio][smtp_processed_seconds]:int} seconds$"
          ]
        }
        tag_on_failure => []
      }
    }

    if [kerio][smtp_processed_count] {
      mutate {
        add_field => {
          "[event][category]" => "email"
          "[event][type]" => "info"
          "[event][action]" => "smtp_send_summary"
        }
      }
    }

    if ![email][local_id] and ![kerio][smtp_processed_count] {
      grok {
        match => {
          "message" => [
            "^SMTP Send: closing connection to %{IP:[destination][ip]}$"
          ]
        }
        tag_on_failure => []
      }
    }

    if [message] =~ /^SMTP Send: closing connection/ {
      mutate {
        add_field => {
          "[event][category]" => "network"
          "[event][type]" => "end"
          "[event][action]" => "smtp_connection_closed"
        }
      }
    }

    if ![email][local_id] and ![kerio][smtp_processed_count] {
      grok {
        match => {
          "message" => [
            "^SMTP Send: message %{DATA:[message_id]} discarded$"
          ]
        }
        tag_on_failure => []
      }
    }

    if [message] =~ /^SMTP Send: message .* discarded$/ {
      mutate {
        add_field => {
          "[event][category]" => "email"
          "[event][type]" => "deletion"
          "[event][action]" => "message_discarded"
          "[event][outcome]" => "failure"
        }
      }
    }

    if [kerio][flow_kind] == "recv" {
      if [kerio][service] == "SMTP" {
        mutate { add_field => { "[network][protocol]" => "smtp" } }
      } else if [kerio][service] == "WebDAV" {
        mutate {
          add_field => {
            "[network][protocol]" => "http"
            "[kerio][protocol]" => "WebDAV"
          }
        }
      } else if [kerio][service] == "Sieve" {
        mutate { add_field => { "[network][protocol]" => "sieve" } }
      } else if [kerio][service] == "Queue" {
        mutate { add_field => { "[kerio][protocol]" => "Queue" } }
      } else if [kerio][service] == "DSN" {
        mutate { add_field => { "[kerio][protocol]" => "DSN" } }
      } else if [kerio][service] == "Kerio Connect Client" {
        mutate {
          add_field => {
            "[network][protocol]" => "http"
            "[kerio][protocol]" => "Kerio Connect Client"
          }
        }
      }

      ruby {
        code => '
          ssl = event.get("[kerio][ssl]")
          if ssl
            event.set("[tls][established]", ssl.to_s.downcase == "yes")
          end
        '
      }

      if [kerio][user_raw] =~ /@/ {
        mutate { add_field => { "[user][email]" => "%{[kerio][user_raw]}" } }
      } else if [kerio][user_raw] {
        mutate { add_field => { "[kerio][user_rule]" => "%{[kerio][user_raw]}" } }
      }
    }

    #
    # Aggregate mail flow by Queue-ID
    #
    if [email][local_id] and [kerio][flow_kind] {
      aggregate {
        task_id => "%{[email][local_id]}"
        periodic_flush => true
        code => '
          map["queue_id"] ||= event.get("[email][local_id]")
          map["first_seen"] ||= event.get("@timestamp")
          map["last_seen"] = event.get("@timestamp")
          map["host_name"] ||= event.get("[host][name]")
          map["service_name"] ||= event.get("[service][name]")
          map["process_name"] ||= event.get("[process][name]")
          map["event_dataset"] ||= event.get("[event][dataset]")

          map["from"] ||= event.get("[email][from][address]")
          map["subject"] ||= event.get("[email][subject]")
          map["kerio_service"] ||= event.get("[kerio][service]")
          map["kerio_protocol"] ||= event.get("[kerio][protocol]")
          map["sender_host"] ||= event.get("[source][ip]")
          map["user_raw"] ||= event.get("[kerio][user_raw]")
          map["user_rule"] ||= event.get("[kerio][user_rule]")
          map["file_size"] ||= event.get("[file][size]")
          map["ssl"] ||= event.get("[kerio][ssl]")
          map["message_id"] ||= event.get("message_id")

          map["tos"] ||= []
          map["results"] ||= []
          map["statuses"] ||= []
          map["remote_hosts"] ||= []
          map["events"] ||= []

          current_to = event.get("[email][to][address]")
          if current_to && !map["tos"].include?(current_to)
            map["tos"] << current_to
          end

          kind = event.get("[kerio][flow_kind]")
          if kind == "recv"
            map["recv_count"] ||= 0
            map["recv_count"] += 1
          elsif kind == "sent"
            map["sent_count"] ||= 0
            map["sent_count"] += 1

            current_result = event.get("[kerio][result]")
            current_status = event.get("[kerio][status]")
            current_remote_host = event.get("[destination][ip]")

            if current_result && !map["results"].include?(current_result)
              map["results"] << current_result
            end
            if current_status && !map["statuses"].include?(current_status)
              map["statuses"] << current_status
            end
            if current_remote_host && !map["remote_hosts"].include?(current_remote_host)
              map["remote_hosts"] << current_remote_host
            end
          end

          event_item = {
            "kind" => kind,
            "timestamp" => event.get("@timestamp"),
            "to" => current_to
          }

          if kind == "sent"
            event_item["result"] = event.get("[kerio][result]")
            event_item["status"] = event.get("[kerio][status]")
            event_item["remote_host"] = event.get("[destination][ip]")
          end

          map["events"] << event_item
        '
        push_map_as_event_on_timeout => true
        timeout_task_id_field => "email.local_id"
        timeout => 30
        timeout_tags => ["_kerio_aggregate_timeout"]
        timeout_code => '
          first_seen = event.get("first_seen")
          last_seen = event.get("last_seen")
          queue_id = event.get("queue_id")
          service_name = event.get("service_name")
          process_name = event.get("process_name")
          event_dataset = event.get("event_dataset")
          host_name = event.get("host_name")
          from_address = event.get("from")
          tos = event.get("tos") || []
          subject = event.get("subject")
          sender_host = event.get("sender_host")
          remote_hosts = event.get("remote_hosts") || []
          kerio_service = event.get("kerio_service")
          kerio_protocol = event.get("kerio_protocol")
          user_raw = event.get("user_raw")
          user_rule = event.get("user_rule")
          ssl = event.get("ssl")
          results = event.get("results") || []
          statuses = event.get("statuses") || []
          recv_count = event.get("recv_count") || 0
          sent_count = event.get("sent_count") || 0
          flow_events = event.get("events") || []
          file_size = event.get("file_size")
          message_id = event.get("message_id")

          event.set("@timestamp", first_seen) if first_seen
          event.set("[event][kind]", "event")
          event.set("[event][category]", ["email"])
          event.set("[event][type]", ["info"])
          event.set("[event][action]", "message_flow_aggregated")
          event.set("[service][name]", service_name) if service_name
          event.set("[process][name]", process_name) if process_name
          event.set("[event][dataset]", event_dataset) if event_dataset
          event.set("[host][name]", host_name) if host_name

          event.set("[email][local_id]", queue_id) if queue_id
          event.set("[email][from][address]", from_address) if from_address
          event.set("[email][to][address]", tos)
          event.set("[email][to_count]", tos.length)
          event.set("[email][subject]", subject) if subject

          event.set("[source][ip]", sender_host) if sender_host
          event.set("[destination][ip]", remote_hosts) if remote_hosts.length > 0

          event.set("[kerio][service]", kerio_service) if kerio_service
          event.set("[kerio][protocol]", kerio_protocol) if kerio_protocol
          event.set("[kerio][user_raw]", user_raw) if user_raw
          event.set("[kerio][user_rule]", user_rule) if user_rule
          event.set("[kerio][ssl]", ssl) if ssl
          event.set("[kerio][results]", results)
          event.set("[kerio][statuses]", statuses)
          event.set("[kerio][recv_count]", recv_count)
          event.set("[kerio][sent_count]", sent_count)
          event.set("[kerio][events]", flow_events)
          event.set("[kerio][first_seen]", first_seen) if first_seen
          event.set("[kerio][last_seen]", last_seen) if last_seen
          event.set("[kerio][log_type]", "flow_aggregate")
          event.set("[file][size]", file_size) if file_size
          event.set("message_id", message_id) if message_id

          event.set("[kerio][has_delivered]", results.include?("delivered"))
          event.set("[kerio][has_relayed]", results.include?("relayed"))
          event.set("[kerio][has_delayed]", results.include?("delayed"))

          if results.include?("delayed")
            event.set("[event][outcome]", "unknown")
          elsif results.include?("delivered") || results.include?("relayed")
            event.set("[event][outcome]", "success")
          else
            event.set("[event][outcome]", "unknown")
          end

          ["first_seen", "last_seen", "queue_id", "service_name", "process_name", "event_dataset", "host_name", "from", "tos", "subject", "sender_host", "remote_hosts", "kerio_service", "kerio_protocol", "user_raw", "user_rule", "ssl", "results", "statuses", "recv_count", "sent_count", "events", "file_size", "tags"].each do |field|
            event.remove(field)
          end
        '
      }
    }

    if ![email][local_id] and ![event][action] {
      mutate { add_tag => ["_kerio_mail_unparsed_v2"] }
    }
  }

  if ![event][action] and ([process][name] == "security" or [process][name] == "kerio") and [message] =~ /^Attempt to deliver to unknown recipient / {
    if [email][to][address] and [email][from][address] {
      mutate {
        add_field => {
          "[event][category]" => "email"
          "[event][type]" => "denied"
          "[event][action]" => "delivery_unknown_recipient"
          "[event][outcome]" => "failure"
          "[event][reason]" => "unknown_recipient"
          "[kerio][result]" => "not_delivered"
          "[network][protocol]" => "smtp"
          "[related][ip]" => "%{[source][ip]}"
          "[related][user]" => "%{[email][from][address]}"
        }
      }
    } else {
      mutate { add_tag => ["_kerio_negative_delivery_unparsed"] }
    }
  }

  ######################################################################
  # COMMON DERIVED FIELDS
  ######################################################################
  if [user][email] and ![user][name] {
    grok {
      tag_on_failure => []
      match => {
        "[user][email]" => "^(?<[@metadata][common_user_name]>[^@]+)@(?<[@metadata][common_user_domain]>.+)$"
      }
    }

    if [@metadata][common_user_name] {
      mutate {
        add_field => {
          "[user][name]" => "%{[@metadata][common_user_name]}"
          "[user][domain]" => "%{[@metadata][common_user_domain]}"
        }
      }
    }
  }
}

output {
  if "kerio_flow_aggregated" in [tags] or [event][action] == "message_flow_aggregated" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "kerio-flow-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "kerio-connect-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  }

  stdout {
    codec => rubydebug { metadata => false }
  }
}
