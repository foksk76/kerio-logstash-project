input {
  udp {
    host => "0.0.0.0"
    port => kerio connect
    codec => plain { charset => "UTF-8" }
    tags => ["kerio", "udp"]
  }

  tcp {
    host => "0.0.0.0"
    port => 13514
    codec => plain { charset => "UTF-8" }
    tags => ["kerio", "tcp"]
  }
}

filter {
  if "kerio" in [tags] {

    mutate {
      copy => { "message" => "[event][original]" }
      add_field => {
        "received_at" => "%{@timestamp}"
      }
    }

    #
    # RFC5424 envelope parse using built-in grok macro SYSLOG5424LINE
    #
    grok {
      match => { "message" => "%{SYSLOG5424LINE}" }
      tag_on_failure => ["_kerio_rfc5424_parse_failure"]
    }

    if [syslog5424_ts] {
      date {
        match => ["syslog5424_ts", "ISO8601"]
        target => "@timestamp"
      }

      mutate {
        add_tag => ["syslog5424"]

        rename => {
          "syslog5424_app"  => "[process][name]"
          "syslog5424_host" => "[host][name]"
          "syslog5424_msg"  => "message"
        }

        remove_field => [
          "syslog5424_ver",
          "syslog5424_proc",
          "syslog5424_msgid",
          "syslog5424_sd",
          "syslog5424_ts"
        ]
      }

      mutate {
        gsub => [
          "message", "^\uFEFF", "",
          "message", "^\s*﻿\s*", "",
          "message", "\r", "",
          "message", "\n+$", "",
          "message", "\s+$", ""
        ]
      }

      ####################################################################
      # MAIL
      ####################################################################
      if [process][name] == "mail" {

        grok {
          match => {
            "message" => [
              "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?, SSL: %{WORD:[kerio][ssl]}, Subject: %{GREEDYDATA:[email][subject]}$",
              "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?, SSL: %{WORD:[kerio][ssl]}, Msg-Id: <%{DATA:[message_id]}>, Subject: %{GREEDYDATA:[email][subject]}$",
              "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}(?:, User: %{DATA:[kerio][user_raw]})?, SSL: %{WORD:[kerio][ssl]}, Msg-Id: <%{DATA:[message_id]}>$",
              "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Report: %{DATA:[kerio][report]}, User: %{DATA:[kerio][user_raw]}, Subject: %{GREEDYDATA:[email][subject]}$",
              "^Recv: Queue-ID: %{DATA:[email][local_id]}, Service: %{DATA:[kerio][service]}, From: <%{EMAILADDRESS:[email][from][address]}>, To: <%{EMAILADDRESS:[email][to][address]}>, Size: %{NUMBER:[file][size]:int}, Sender-Host: %{IP:[source][ip]}, SSL: %{WORD:[kerio][ssl]}, Subject: %{GREEDYDATA:[email][subject]}$",
              "^Sent: Queue-ID: %{DATA:[email][local_id]}, Recipient: <%{EMAILADDRESS:[email][to][address]}>, Result: %{DATA:[kerio][result]}, Status: %{DATA:[kerio][status]} ?, Remote-Host: %{IP:[destination][ip]}, Msg-Id: <%{DATA:[message_id]}>$",
              "^Sent: Queue-ID: %{DATA:[email][local_id]}, Recipient: <%{EMAILADDRESS:[email][to][address]}>, Result: %{DATA:[kerio][result]}, Status: %{DATA:[kerio][status]} ?, Remote-Host: %{IP:[destination][ip]}$",
              "^SMTP Send: %{NUMBER:[kerio][smtp_processed_count]:int} outgoing messages processed in %{NUMBER:[kerio][smtp_processed_seconds]:int} seconds$",
              "^SMTP Send: closing connection to %{IP:[destination][ip]}$",
              "^SMTP Send: message %{DATA:[message_id]} discarded$"
            ]
          }
          tag_on_failure => ["_kerio_mail_parse_failure"]
        }

        if [message] =~ /^Recv:/ {
          mutate {
            add_field => {
              "[event][category]" => "email"
              "[event][type]" => "info"
              "[event][action]" => "message_received"
            }
          }

          if [kerio][service] == "SMTP" {
            mutate { add_field => { "[network][protocol]" => "smtp" } }
          } else if [kerio][service] == "WebDAV" {
            mutate {
              add_field => {
                "[network][protocol]" => "http"
                "[kerio][protocol]" => "WebDAV"
              }
            }
          } else if [kerio][service] == "Sieve" {
            mutate { add_field => { "[network][protocol]" => "sieve" } }
          } else if [kerio][service] == "Queue" {
            mutate { add_field => { "[kerio][protocol]" => "Queue" } }
          } else if [kerio][service] == "DSN" {
            mutate { add_field => { "[kerio][protocol]" => "DSN" } }
          } else if [kerio][service] == "Kerio Connect Client" {
            mutate {
              add_field => {
                "[network][protocol]" => "http"
                "[kerio][protocol]" => "Kerio Connect Client"
              }
            }
          }

          ruby {
            code => '
              ssl = event.get("[kerio][ssl]")
              if ssl
                event.set("[tls][established]", ssl.to_s.downcase == "yes")
              end
            '
          }

          if [kerio][user_raw] =~ /@/ {
            mutate { add_field => { "[user][email]" => "%{[kerio][user_raw]}" } }
          } else if [kerio][user_raw] {
            mutate { add_field => { "[kerio][user_rule]" => "%{[kerio][user_raw]}" } }
          }
        }

        if [message] =~ /^Sent:/ {
          mutate {
            add_field => {
              "[event][category]" => "email"
              "[event][type]" => "delivery"
              "[event][action]" => "message_sent"
            }
          }

          if [kerio][result] {
            mutate { lowercase => ["[kerio][result]"] }
          }

          if [kerio][result] == "delivered" or [kerio][result] == "relayed" {
            mutate { add_field => { "[event][outcome]" => "success" } }
          } else if [kerio][result] == "delayed" {
            mutate { add_field => { "[event][outcome]" => "unknown" } }
          }
        }

        if [kerio][smtp_processed_count] {
          mutate {
            add_field => {
              "[event][category]" => "email"
              "[event][type]" => "info"
              "[event][action]" => "smtp_send_summary"
            }
          }
        }

        if [message] =~ /^SMTP Send: closing connection/ {
          mutate {
            add_field => {
              "[event][category]" => "network"
              "[event][type]" => "end"
              "[event][action]" => "smtp_connection_closed"
            }
          }
        }

        if [message] =~ /^SMTP Send: message .* discarded$/ {
          mutate {
            add_field => {
              "[event][category]" => "email"
              "[event][type]" => "deletion"
              "[event][action]" => "message_discarded"
              "[event][outcome]" => "failure"
            }
          }
        }
      }

      ####################################################################
      # AUDIT
      ####################################################################
      else if [process][name] == "audit" {
        grok {
          match => {
            "message" => [
              "^%{DATA:[kerio][protocol_raw]}: User %{EMAILADDRESS:[user][email]} authenticated\s+from IP address %{IP:[source][ip]}(?:; %{GREEDYDATA:[user_agent][original]})?$"
            ]
          }
          tag_on_failure => ["_kerio_audit_parse_failure"]
        }

        if [user][email] {
          mutate {
            add_field => {
              "[event][category]" => "authentication"
              "[event][type]" => "start"
              "[event][action]" => "user_authenticated"
              "[event][outcome]" => "success"
            }
          }

          if [kerio][protocol_raw] == "IMAP" {
            mutate { add_field => { "[network][protocol]" => "imap" } }
          } else if [kerio][protocol_raw] == "POP3" {
            mutate { add_field => { "[network][protocol]" => "pop3" } }
          } else if [kerio][protocol_raw] == "SMTP" {
            mutate { add_field => { "[network][protocol]" => "smtp" } }
          } else if [kerio][protocol_raw] == "HTTP/KOFF" {
            mutate {
              add_field => {
                "[network][protocol]" => "http"
                "[kerio][protocol]" => "HTTP/KOFF"
              }
            }
          } else if [kerio][protocol_raw] == "HTTP/WebMail" {
            mutate {
              add_field => {
                "[network][protocol]" => "http"
                "[kerio][protocol]" => "HTTP/WebMail"
              }
            }
          }
        }
      }

      ####################################################################
      # SECURITY
      ####################################################################
      else if [process][name] == "security" {
        grok {
          match => {
            "message" => [
              "^SMTP Spam attack detected from %{IP:[source][ip]}:%{NUMBER:[source][port]:int}, %{GREEDYDATA:[event][reason]}$",
              "^%{DATA:[kerio][protocol_raw]}: User %{EMAILADDRESS:[user][email]} doesn't exist\. Attempt from IP address %{IP:[source][ip]}\.?$",
              "^Failed %{DATA:[kerio][protocol_raw]} login from %{IP:[source][ip]}, user %{EMAILADDRESS:[user][email]}(?: not found)?\.?$",
              "^Failed %{DATA:[kerio][protocol_raw]} login from %{IP:[source][ip]} with SASL method %{WORD:[kerio][sasl_method]}\.?$",
              "^%{DATA:[kerio][protocol_raw]}: User %{EMAILADDRESS:[user][email]} - login denied: Access Policy rule '%{DATA:[kerio][access_policy_rule]}' used\. Attempt from IP address %{IP:[source][ip]}\.?$",
              "^Attempt to deliver to unknown recipient <%{EMAILADDRESS:[email][to][address]}>, from <%{EMAILADDRESS:[email][from][address]}>, IP address %{IP:[source][ip]}$"
            ]
          }
          tag_on_failure => ["_kerio_security_parse_failure"]
        }

        if [message] =~ /^SMTP Spam attack detected/ {
          mutate {
            add_field => {
              "[event][category]" => "threat"
              "[event][type]" => "indicator"
              "[event][action]" => "smtp_spam_attack_detected"
              "[event][outcome]" => "failure"
              "[network][protocol]" => "smtp"
            }
          }
        } else if [message] =~ /doesn't exist/ {
          mutate {
            add_field => {
              "[event][category]" => "authentication"
              "[event][type]" => "start"
              "[event][action]" => "login_failed"
              "[event][outcome]" => "failure"
              "[event][reason]" => "user_not_found"
            }
          }
        } else if [message] =~ /^Failed / {
          mutate {
            add_field => {
              "[event][category]" => "authentication"
              "[event][type]" => "start"
              "[event][action]" => "login_failed"
              "[event][outcome]" => "failure"
            }
          }
        } else if [kerio][access_policy_rule] {
          mutate {
            add_field => {
              "[event][category]" => "authentication"
              "[event][type]" => "denied"
              "[event][action]" => "login_denied"
              "[event][outcome]" => "failure"
              "[event][reason]" => "access_policy"
            }
          }
        } else if [email][to][address] and [email][from][address] {
          mutate {
            add_field => {
              "[event][category]" => "email"
              "[event][type]" => "info"
              "[event][action]" => "delivery_unknown_recipient"
              "[event][outcome]" => "failure"
              "[event][reason]" => "unknown_recipient"
            }
          }
        }

        if [kerio][protocol_raw] == "IMAP" {
          mutate { add_field => { "[network][protocol]" => "imap" } }
        } else if [kerio][protocol_raw] == "POP3" {
          mutate { add_field => { "[network][protocol]" => "pop3" } }
        } else if [kerio][protocol_raw] == "SMTP" {
          mutate { add_field => { "[network][protocol]" => "smtp" } }
        } else if [kerio][protocol_raw] == "HTTP/KOFF" {
          mutate {
            add_field => {
              "[network][protocol]" => "http"
              "[kerio][protocol]" => "HTTP/KOFF"
            }
          }
        }
      }

      ####################################################################
      # WARN
      ####################################################################
      else if [process][name] == "warn" {
        grok {
          match => {
            "message" => [
              "^No local mailbox %{EMAILADDRESS:[email][to][address]}, expanded from %{EMAILADDRESS:[kerio][expanded_from]}$",
              "^Address <%{EMAILADDRESS:[email][to][address]}> expanded to zero recipients$"
            ]
          }
          tag_on_failure => ["_kerio_warn_parse_failure"]
        }

        if [email][to][address] {
          mutate {
            add_field => {
              "[event][category]" => "email"
              "[event][type]" => "info"
              "[event][action]" => "address_expansion_warning"
              "[event][outcome]" => "failure"
            }
          }
        }
      }

      ####################################################################
      # OPERATIONS
      ####################################################################
      else if [process][name] == "operations" {
        grok {
          match => {
            "message" => [
              '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, Destination Folder: %{DATA:[kerio][folder][destination]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Msg-Id: <<%{DATA:[message_id]}>>, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$',
              '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Msg-Id: <<%{DATA:[message_id]}>>, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$',
              '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, Destination Folder: %{DATA:[kerio][folder][destination]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$',
              '^\{%{WORD:[event][action]}\} Protocol: %{DATA:[kerio][protocol_raw]}, User: %{EMAILADDRESS:[user][email]}, IP: %{IP:[source][ip]}, Folder: %{DATA:[file][directory]}, From: %{GREEDYDATA:[@metadata][from_block]}, Subject: %{GREEDYDATA:[email][subject]}, Delivered: %{DATA:[kerio][delivered_raw]}, Size: %{NUMBER:[file][size]:int}$'
            ]
          }
          tag_on_failure => ["_kerio_operations_parse_failure"]
        }

        if [event][action] {
          mutate {
            lowercase => ["[event][action]"]
            add_field => {
              "[event][category]" => "email"
              "[event][type]" => "change"
            }
          }

          grok {
            match => {
              "[@metadata][from_block]" => [
                '^""%{DATA:[email][from][name]}"" <%{EMAILADDRESS:[email][from][address]}>$',
                '^"%{DATA:[email][from][name]}" <%{EMAILADDRESS:[email][from][address]}>$',
                '^<%{EMAILADDRESS:[email][from][address]}>$',
                '^%{DATA:[email][from][name]} <%{EMAILADDRESS:[email][from][address]}>$'
              ]
            }
            tag_on_failure => []
          }

          if [kerio][protocol_raw] == "IMAP" {
            mutate { add_field => { "[network][protocol]" => "imap" } }
          } else if [kerio][protocol_raw] == "HTTP/KOFF" {
            mutate {
              add_field => {
                "[network][protocol]" => "http"
                "[kerio][protocol]" => "HTTP/KOFF"
              }
            }
          }

          date {
            match => ["[kerio][delivered_raw]", "dd/MMM/yyyy HH:mm:ss"]
            target => "[kerio][delivered_at]"
            locale => "en"
          }
        }
      }

      ####################################################################
      # COMMON DERIVED FIELDS
      ####################################################################
      if [user][email] and ![user][name] {
        grok {
          match => {
            "[user][email]" => "^(?<[@metadata][user_name_only]>[^@]+)@(?<[@metadata][user_domain_only]>.+)$"
          }
          tag_on_failure => []
        }

        if [@metadata][user_name_only] {
          mutate {
            add_field => {
              "[user][name]" => "%{[@metadata][user_name_only]}"
              "[user][domain]" => "%{[@metadata][user_domain_only]}"
            }
          }
        }
      }
    }
  }
}

output {
  if "kerio_flow_aggregated" in [tags] or [event][action] == "message_flow_aggregated" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "kerio-flow-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "kerio-connect-%{+YYYY.MM.dd}"
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
    }
  }

  stdout {
    codec => rubydebug { metadata => false }
  }
}
