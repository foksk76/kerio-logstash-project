services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.11
    container_name: kerio-elasticsearch
    environment:
      - node.name=es01
      - cluster.name=kerio-es
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./elasticsearch/templates:/templates:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20

  kibana-token-init:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.11
    user: "0"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - TOKEN_DIR=/run/kibana-token
      - TOKEN_FILE=/run/kibana-token/service_account_token
      - TOKEN_NAME_PREFIX=kerio-kibana
    entrypoint: ["/bin/bash", "/bootstrap/generate-service-token.sh"]
    restart: "no"
    volumes:
      - kibana_token:/run/kibana-token
      - ./docker/kibana/generate-service-token.sh:/bootstrap/generate-service-token.sh:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.11
    container_name: kerio-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana-token-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/bootstrap/start-with-service-token.sh"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_PUBLICBASEURL=http://localhost:5601
      - XPACK_SECURITY_ENCRYPTIONKEY=bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    ports:
      - "5601:5601"
    volumes:
      - kibana_token:/run/kibana-token:ro
      - ./docker/kibana/start-with-service-token.sh:/bootstrap/start-with-service-token.sh:ro

  logstash:
    image: docker.elastic.co/logstash/logstash:8.19.11
    container_name: kerio-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms1g -Xmx1g
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "5514:5514/tcp"
      - "5514:5514/udp"
      - "9600:9600"
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/config/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./testdata:/testdata:ro

volumes:
  esdata:
  kibana_token:
